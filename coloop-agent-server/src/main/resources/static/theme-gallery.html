<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主题画廊 - coloop-agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f8f9fa;
            color: #111;
            line-height: 1.6;
        }

        .page-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #e5e7eb;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-header h1 {
            font-size: 20px;
            font-weight: 700;
        }

        .back-link {
            font-size: 14px;
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .gallery {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 24px;
        }

        .theme-card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .theme-card:hover {
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            transform: translateY(-2px);
        }

        .theme-card.selected {
            border-color: #2563eb;
        }

        .theme-card.selected::after {
            content: '当前使用中';
            position: absolute;
            top: 12px;
            right: 12px;
            background: #2563eb;
            color: #fff;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 500;
        }

        .preview-wrapper {
            height: 280px;
            overflow: hidden;
            position: relative;
        }

        .preview-wrapper iframe {
            width: 100%;
            height: 650px;
            border: none;
            transform: scale(0.55);
            transform-origin: top left;
            pointer-events: none;
        }

        .theme-info {
            padding: 16px;
            border-top: 1px solid #e5e7eb;
        }

        .theme-info h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .theme-info p {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .theme-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background: #2563eb;
            color: #fff;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .theme-card {
            position: relative;
        }
    </style>
</head>
<body>
    <header class="page-header">
        <h1>主题画廊</h1>
        <a class="back-link" href="index.html">← 返回聊天</a>
    </header>

    <div class="gallery" id="gallery">
        <!-- Theme cards will be generated by JS -->
    </div>

    <script>
        (function() {
            var themes = [
                { id: 'claude', name: 'Claude 优雅紫', desc: '温暖渐变，Crimson Pro 衬线字体，圆润气泡', color: '#f0e6f6' },
                { id: 'chatgpt', name: 'ChatGPT 极简', desc: '纯白克制，Inter 字体，绿色强调', color: '#ffffff' },
                { id: 'cursor', name: 'Cursor 极客暗', desc: '深蓝灰底，JetBrains Mono 等宽，代码感', color: '#0f172a' },
                { id: 'discord', name: 'Discord 社交暗', desc: '深灰底，紫蓝消息，彩色状态标签', color: '#36393f' },
                { id: 'linear', name: 'Linear 专业白', desc: '黑白分明，极致留白与秩序感', color: '#ffffff' },
                { id: 'telegram', name: 'Telegram 明快', desc: '蓝色渐变背景，大圆角，轻快活泼', color: '#6ab4f0' },
                { id: 'terminal', name: '终端复古', desc: '黑底荧光绿，CRT 扫描线，硬核极客', color: '#0c0c0c' },
                { id: 'glass', name: '玻璃华丽', desc: '流动渐变动画，毛玻璃卡片，视觉冲击', color: '#667eea' }
            ];

            var STORAGE_KEY = 'coloop-agent-theme';
            var DEFAULT_THEME = 'claude';
            var currentTheme = localStorage.getItem(STORAGE_KEY) || DEFAULT_THEME;
            var gallery = document.getElementById('gallery');

            function createThemeCard(theme) {
                var isSelected = theme.id === currentTheme;
                var card = document.createElement('div');
                card.className = 'theme-card' + (isSelected ? ' selected' : '');
                card.innerHTML =
                    '<div class="preview-wrapper" style="background:' + theme.color + '">' +
                    '    <iframe src="theme-preview.html?theme=' + theme.id + '" scrolling="no"></iframe>' +
                    '</div>' +
                    '<div class="theme-info">' +
                    '    <h3>' + theme.name + '</h3>' +
                    '    <p>' + theme.desc + '</p>' +
                    '    <div class="theme-actions">' +
                    '        <button class="btn btn-primary" data-theme="' + theme.id + '">选择此主题</button>' +
                    '        <a class="btn btn-secondary" href="theme-preview.html?theme=' + theme.id + '" target="_blank">全屏预览</a>' +
                    '    </div>' +
                    '</div>';
                return card;
            }

            themes.forEach(function(theme) {
                gallery.appendChild(createThemeCard(theme));
            });

            gallery.addEventListener('click', function(e) {
                if (e.target.tagName === 'BUTTON' && e.target.dataset.theme) {
                    var themeId = e.target.dataset.theme;
                    localStorage.setItem(STORAGE_KEY, themeId);
                    window.location.href = 'index.html';
                }
            });
        })();
    </script>
</body>
</html>
